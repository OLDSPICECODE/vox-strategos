server {
    listen 80;
    server_name localhost;

    # Directorio donde Angular deja los archivos (ajustado a tu build)
    root /usr/share/nginx/html;
    index index.html;

    # 1. FRONTEND: Manejo de rutas de Angular
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. BACKEND: El "Puente" hacia tu API de Node
    # Cuando Angular llame a /api, Nginx lo enviará al contenedor 'backend'
    location /api/ {
        # 'backend' es el nombre del servicio en tu docker-compose.prod.yml
        proxy_pass http://backend:3000/; 
        
        # Configuraciones necesarias para que no se pierda la conexión
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Pasar la IP real del usuario al backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. OPTIMIZACIÓN: Caché para archivos estáticos (imágenes, js, css)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|otf|ttf|svg)$ {
        expires 6d;
        add_header Cache-Control "public";
    }

    # Manejo de errores 50x
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}