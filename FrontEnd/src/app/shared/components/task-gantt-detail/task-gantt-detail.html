<div
  class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-4 transition-all"
  (click)="closeModal()"
>
  <div
    class="bg-white w-full max-w-2xl rounded-2xl shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] overflow-hidden flex flex-col max-h-[90vh] border-2 border-slate-200"
    (click)="$event.stopPropagation()"
  >
    <div class="px-8 py-6 border-b border-slate-200 flex justify-between items-start bg-slate-50">
      <div class="flex flex-col gap-2 w-full mr-6 text-slate-900">
        <div class="flex items-center gap-2">
          <span
            class="px-2 py-0.5 bg-slate-800 text-white text-[10px] font-black rounded uppercase tracking-tighter"
            >Tarea</span
          >
          <span class="text-[10px] font-mono text-slate-500 font-bold"
            >#{{ task?.id || 'ID' }}</span
          >
        </div>
        <input
          type="text"
          [(ngModel)]="editedTask.nombre"
          class="text-2xl font-black text-slate-900 bg-transparent border-none focus:ring-0 p-0 w-full placeholder:text-slate-300"
          placeholder="Nombre de la actividad..."
        />
      </div>
      <button
        (click)="closeModal()"
        class="text-slate-400 hover:text-red-600 p-2 hover:bg-red-50 rounded-xl transition-all"
      >
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <div class="flex px-8 gap-8 border-b border-slate-200 bg-white">
      <button
        (click)="setTab('general')"
        [class]="
          activeTab === 'general'
            ? 'text-blue-700 border-blue-600'
            : 'text-slate-500 border-transparent hover:text-slate-800'
        "
        class="py-4 text-[11px] font-black uppercase tracking-[0.15em] border-b-2 transition-all flex items-center gap-2"
      >
        <i class="fas fa-file-alt"></i> General
      </button>
      <button
        (click)="setTab('recursos')"
        [class]="
          activeTab === 'recursos'
            ? 'text-blue-700 border-blue-600'
            : 'text-slate-500 border-transparent hover:text-slate-800'
        "
        class="py-4 text-[11px] font-black uppercase tracking-[0.15em] border-b-2 transition-all flex items-center gap-2"
      >
        <i class="fas fa-user-tie"></i> Recursos
      </button>
      <button
        (click)="setTab('gantt')"
        [class]="
          activeTab === 'gantt'
            ? 'text-blue-700 border-blue-600'
            : 'text-slate-500 border-transparent hover:text-slate-800'
        "
        class="py-4 text-[11px] font-black uppercase tracking-[0.15em] border-b-2 transition-all flex items-center gap-2"
      >
        <i class="fas fa-stream"></i> Gantt
      </button>
    </div>

    <div class="p-8 overflow-y-auto grow bg-white">
      <div *ngIf="activeTab === 'general'" class="space-y-6">
        <div class="space-y-2">
          <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest"
            >Descripción</label
          >
          <textarea
            [(ngModel)]="editedTask.descripcion"
            rows="4"
            class="w-full rounded-xl border border-slate-300 bg-slate-50 text-slate-900 p-4 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm"
            placeholder="Descripción de la tarea..."
          ></textarea>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest"
              >Fecha Inicio</label
            >
            <input
              type="date"
              [(ngModel)]="editedTask.fechaInicio"
              class="w-full rounded-xl border border-slate-300 bg-white text-slate-900 p-3 text-sm font-bold"
            />
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest"
              >Fecha Fin</label
            >
            <input
              type="date"
              [(ngModel)]="editedTask.fechaFin"
              class="w-full rounded-xl border border-slate-300 bg-white text-slate-900 p-3 text-sm font-bold"
            />
          </div>
        </div>
      </div>

      <div *ngIf="activeTab === 'recursos'" class="space-y-8 animate-in fade-in duration-300">
        <div class="bg-slate-900 rounded-2xl p-6 shadow-xl border border-slate-800">
          <label class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-4 block"
            >Asignar Personal</label
          >
          <div class="flex gap-3">
            <div class="relative grow">
              <select
                #userSelect
                style="color: #0f172a !important; background-color: white !important"
                class="w-full rounded-xl border-2 border-white text-slate-900 text-sm font-black p-4 appearance-none cursor-pointer focus:ring-4 focus:ring-blue-500/40"
              >
                <option value="" style="color: #64748b !important">
                  --- Seleccionar Colaborador ---
                </option>
                <option
                  *ngFor="let user of dbUsers"
                  [value]="user.id"
                  style="
                    color: #0f172a !important;
                    background-color: white !important;
                    font-weight: bold;
                  "
                >
                  {{ user.nombre + ' ' + user.apellido | uppercase }}
                </option>
              </select>
              <div
                class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-900"
              >
                <i class="fas fa-chevron-down text-xs"></i>
              </div>
            </div>
            <button
              (click)="addWorker(userSelect.value); userSelect.value = ''"
              class="px-6 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-lg active:scale-95"
            >
              Añadir
            </button>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div
            *ngFor="let worker of editedTask.trabajadores"
            class="group flex items-center gap-4 p-4 bg-white border border-slate-200 rounded-2xl hover:border-blue-400 shadow-sm transition-all"
          >
            <div
              class="w-12 h-12 rounded-xl bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-900 font-black text-sm shadow-sm group-hover:bg-blue-600 group-hover:text-white transition-colors"
            >
              {{ getInitials(worker?.nombre) }}
            </div>
            <div class="grow min-w-0">
              <p class="text-sm font-black text-slate-900 uppercase truncate leading-none">
                {{ worker?.nombre }} {{ worker?.apellido }}
              </p>
              <p class="text-[10px] text-slate-500 font-bold truncate mt-1">{{ worker?.email }}</p>
            </div>
            <button
              (click)="removeWorker(worker.id)"
              class="p-2 text-slate-300 hover:text-red-600 transition-all"
            >
              <i class="fas fa-trash-alt"></i>
            </button>
          </div>
        </div>
      </div>

      <div *ngIf="activeTab === 'gantt'" class="space-y-6">
        <div class="bg-blue-50 border border-blue-200 rounded-2xl p-6 space-y-6 shadow-inner">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-blue-900 uppercase tracking-widest"
              >Tarea Predecesora</label
            >
            <div class="relative">
              <select
                [(ngModel)]="editedTask.predecesoraId"
                style="color: #0f172a !important; background-color: white !important"
                class="w-full rounded-xl border border-blue-300 text-slate-900 text-sm font-bold p-4 shadow-sm appearance-none cursor-pointer focus:ring-4 focus:ring-blue-500/20"
              >
                <option [ngValue]="null" style="color: #64748b !important">
                  --- No tiene predecesora ---
                </option>
                <option
                  *ngFor="let t of allTasks"
                  [value]="t.id"
                  [disabled]="t.id === task.id"
                  style="
                    color: #0f172a !important;
                    background-color: white !important;
                    font-weight: bold;
                  "
                >
                  {{ t.nombre | uppercase }}
                </option>
              </select>
              <div
                class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-blue-900"
              >
                <i class="fas fa-link text-xs"></i>
              </div>
            </div>
          </div>

          <div class="space-y-2" *ngIf="editedTask.predecesoraId">
            <label class="text-[10px] font-black text-blue-900 uppercase tracking-widest"
              >Tipo de Dependencia</label
            >
            <select
              [(ngModel)]="editedTask.tipoDependencia"
              style="color: #0f172a !important; background-color: white !important"
              class="w-full rounded-xl border border-blue-300 text-slate-900 text-sm font-bold p-4 shadow-sm focus:ring-4 focus:ring-blue-500/20"
            >
              <option value="FS" style="color: #0f172a !important">FIN A INICIO (FS)</option>
              <option value="SS" style="color: #0f172a !important">INICIO A INICIO (SS)</option>
              <option value="FF" style="color: #0f172a !important">FIN A FIN (FF)</option>
              <option value="SF" style="color: #0f172a !important">INICIO A FIN (SF)</option>
            </select>
          </div>
        </div>

        <div class="p-4 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50">
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-4"
            >Sucesores (Impacto)</label
          >
          <div class="space-y-2">
            <div
              *ngFor="let s of sucesoras"
              class="flex items-center gap-3 text-[11px] text-slate-700 font-black bg-white p-3 rounded-lg border border-slate-200 shadow-sm"
            >
              <i class="fas fa-arrow-right text-blue-500"></i> {{ s.nombre | uppercase }}
            </div>
            <p
              *ngIf="!sucesoras?.length"
              class="text-center text-slate-400 text-[10px] italic py-4"
            >
              Ninguna tarea depende de este elemento actualmente.
            </p>
          </div>
        </div>
      </div>
    </div>

    <div
      class="px-8 py-6 bg-slate-50 border-t border-slate-200 flex justify-end items-center gap-6 font-black"
    >
      <button
        (click)="closeModal()"
        class="text-[11px] uppercase tracking-widest text-slate-400 hover:text-slate-800 transition-all"
      >
        Descartar
      </button>
      <button
        (click)="confirmSave()"
        [disabled]="isLoading"
        class="px-10 py-4 bg-slate-900 text-white text-[11px] uppercase tracking-[0.2em] rounded-xl hover:bg-blue-700 transition-all shadow-xl active:scale-95 disabled:opacity-50 flex items-center gap-3"
      >
        <i *ngIf="isLoading" class="fas fa-circle-notch animate-spin"></i>
        {{ isLoading ? 'PROCESANDO' : 'GUARDAR CAMBIOS' }}
      </button>
    </div>
  </div>
</div>
