<div class="flex h-full w-full overflow-hidden">
  <aside
    class="flex w-[320px] flex-shrink-0 flex-col border-r border-slate-100 bg-slate-50/40 z-50"
  >
    <div class="bg-[#1e1b4b] p-6 text-white shadow-lg">
      <div class="flex items-center space-x-2 mb-2">
        <span class="material-symbols-outlined text-sky-400 text-sm">settings_suggest</span>
        <span class="text-[10px] font-black uppercase tracking-widest text-indigo-200"
          >Vox Strategos</span
        >
      </div>
      <h3 class="text-lg font-bold">Panel de Control</h3>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar bg-white">
      <header class="p-5 border-b border-slate-50">
        <h4 class="text-xs font-black text-slate-900 uppercase tracking-widest">Lista de Tareas</h4>
      </header>
      <div class="p-4 space-y-3">
        <div
          *ngFor="let job of rawJobs"
          class="task-card p-4 bg-white border border-slate-200 rounded-xl hover:border-sky-300 transition-all cursor-pointer shadow-sm"
        >
          <p class="text-[11px] font-black text-slate-800">{{ job.nombre }}</p>
          <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">{{
            job.prioridad
          }}</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="flex flex-1 flex-col overflow-hidden relative">
    <header class="sub-navbar">
      <div class="flex items-center space-x-8">
        <div>
          <h1 class="text-xl font-black text-slate-950 tracking-tighter italic">VOX GANTT</h1>
          <p class="text-xs font-bold text-sky-700 uppercase tracking-tight truncate max-w-[250px]">
            {{ selectedProjectName }}
          </p>
        </div>

        <div
          class="flex items-center space-x-4 bg-slate-50 px-4 py-2.5 rounded-2xl border border-slate-100"
        >
          <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"
            >Progreso Global</span
          >
          <div class="w-32 h-2.5 bg-slate-200 rounded-full overflow-hidden">
            <div
              class="h-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.3)]"
              style="width: 68%"
            ></div>
          </div>
          <span class="text-xs font-black text-slate-800">68%</span>
        </div>
      </div>

      <div class="flex items-center space-x-4">
        <button
          (click)="addMilestone()"
          class="flex items-center px-5 py-2.5 bg-sky-600 text-white rounded-xl shadow-lg font-bold text-[10px] uppercase tracking-widest hover:bg-sky-700 transition-all active:scale-95"
        >
          <span class="material-symbols-outlined text-lg mr-2 font-black">add</span> Agregar Hito
        </button>

        <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
          <button
            *ngFor="let mode of viewModes"
            (click)="changeViewMode(mode)"
            [class]="currentMode === mode ? 'bg-white text-sky-700 shadow-sm' : 'text-slate-500'"
            class="px-5 py-2 rounded-lg text-[10px] font-black uppercase transition-all tracking-tighter"
          >
            {{ mode }}
          </button>
        </div>
      </div>
    </header>

    <div class="gantt-map-surface custom-scrollbar">
      <div
        *ngIf="isLoading"
        class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-white/60 backdrop-blur-sm"
      >
        <div
          class="h-10 w-10 animate-spin rounded-full border-4 border-sky-600 border-t-transparent"
        ></div>
        <span class="mt-4 text-[10px] font-black uppercase tracking-widest text-sky-900"
          >Sincronizando Mapa...</span
        >
      </div>

      <div class="min-w-[3000px] h-full p-10 relative">
        <div
          class="absolute top-0 bottom-0 w-[2px] bg-red-500/50 shadow-[0_0_10px_rgba(239,68,68,0.5)] z-20"
          style="left: 480px"
        >
          <div
            class="absolute top-2 -left-3 bg-red-500 text-white text-[8px] font-black px-1.5 py-0.5 rounded shadow"
          >
            HOY
          </div>
        </div>

        <svg #gantt_canvas class="w-full h-full outline-none"></svg>
      </div>
    </div>
  </main>
</div>
