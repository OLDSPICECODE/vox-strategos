version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: vox-strategos-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5435:5432" # 👈 IMPORTANTE: En pgAdmin usa el puerto 5435
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Corregido: Es mejor usar el usuario por defecto o el del env de forma segura
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: vox-strategos-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: # 👈 Esto asegura que tu data NO se borre aunque apagues Docker