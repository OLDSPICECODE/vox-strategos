version: "3.8"

services:
  # --- FRONTEND (NGINX + ANGULAR) ---
  frontend:
    build:
      context: ./FrontEnd  # 👈 Corregido: Coincide con tu carpeta
      dockerfile: Dockerfile
    container_name: vox-strategos-front-prod
    restart: always
    networks:
      - vox-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- DATABASE (POSTGRESQL) ---
  db:
    image: postgres:15-alpine
    container_name: vox-strategos-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - vox-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # --- PGADMIN (MANTENIMIENTO) ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: vox-strategos-pgadmin-prod
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    networks:
      - vox-internal
    depends_on:
      db:
        condition: service_healthy

  # --- NGROK (PROXIED ACCESS) ---
  ngrok:
    image: ngrok/ngrok:latest
    container_name: vox-strategos-ngrok-prod
    restart: always
    environment:
      - NGROK_AUTHTOKEN=3AB4V7tE79QzgXfE4dppz7ax4W4_7ypQZhcLTqxzixU9HWAwA
    command:
      - "http"
      - "frontend:80"
    networks:
      - vox-internal
    depends_on:
      - frontend

networks:
  vox-internal:
    driver: bridge

volumes:
  postgres_prod_data: